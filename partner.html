<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專屬分潤數據中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        klein: {
                            DEFAULT: '#002FA7', 
                            light: '#335CFF',
                            dark: '#001D66',
                            glass: 'rgba(0, 47, 167, 0.1)'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', -apple-system, sans-serif; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
        }

        .custom-dropdown-menu {
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .custom-dropdown-menu.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        
        .fav-bubble {
            padding: 6px 16px;
            border-radius: 50px;
            background: rgba(0, 0, 0, 0.04);
            font-size: 13px;
            font-weight: 800;
            color: #6E6E73;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
            white-space: nowrap;
        }
        .fav-bubble:hover { background: rgba(0, 47, 167, 0.1); color: #002FA7; }
        .fav-bubble.active { 
            background: #002FA7; 
            color: white; 
            box-shadow: 0 4px 10px rgba(0, 47, 167, 0.3); 
            transform: scale(1.05) translateY(-2px); 
        }

        .loading-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-gradient-to-br from-[#f0f4ff] via-[#ffffff] to-[#e6ecf8] min-h-screen text-gray-800 pb-12">

    <nav class="sticky top-0 z-50 px-4 py-4">
        <div class="max-w-6xl mx-auto glass-panel rounded-full px-6 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-3 h-8 bg-klein rounded-full"></div>
                <h1 class="text-xl font-black text-gray-900 tracking-wider">數據中心</h1>
            </div>
            <div class="flex items-center gap-4">
                <div id="last-update" class="hidden md:block text-xs font-semibold text-gray-500">連線中...</div>
                <button onclick="location.reload()" class="bg-klein hover:bg-klein-dark text-white px-5 py-2 rounded-full text-sm font-bold transition-all shadow-lg shadow-klein/30 hover:scale-105">
                    🔄 重新整理
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4 mt-8">
        
        <div class="glass-panel rounded-2xl p-4 mb-8 flex flex-wrap gap-4 items-center justify-between relative z-40">
            <div class="flex items-center gap-2 pl-2">
                <span class="text-sm font-black text-gray-400 tracking-widest uppercase">時間區間</span>
            </div>
            <div class="flex gap-3">
                <div class="relative" id="year-dropdown-container">
                    <button class="bg-white/70 border-2 border-white rounded-xl px-4 py-2 font-bold text-klein shadow-sm flex items-center justify-between w-36 hover:border-klein/30 transition-all" onclick="toggleDropdown('year-menu')">
                        <span id="year-btn-text">所有年度</span>
                        <svg class="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>
                    </button>
                    <div id="year-menu" class="custom-dropdown-menu absolute top-full left-0 mt-2 w-full glass-panel rounded-xl py-2 flex flex-col max-h-60 overflow-y-auto">
                        <div class="px-4 py-2 text-sm font-bold text-gray-600 hover:bg-klein/10 hover:text-klein cursor-pointer transition-colors" onclick="selectYear('all', '所有年度')">所有年度</div>
                        <div id="year-options"></div>
                    </div>
                </div>

                <div class="relative" id="month-dropdown-container">
                    <button class="bg-white/70 border-2 border-white rounded-xl px-4 py-2 font-bold text-klein shadow-sm flex items-center justify-between w-32 hover:border-klein/30 transition-all" onclick="toggleDropdown('month-menu')">
                        <span id="month-btn-text">全年度</span>
                        <svg class="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>
                    </button>
                    <div id="month-menu" class="custom-dropdown-menu absolute top-full left-0 mt-2 w-full glass-panel rounded-xl py-2 flex flex-col max-h-60 overflow-y-auto">
                        <div class="px-4 py-2 text-sm font-bold text-gray-600 hover:bg-klein/10 hover:text-klein cursor-pointer transition-colors" onclick="selectMonth('all', '全年度')">全年度</div>
                        <script>
                            for(let i=1; i<=12; i++) {
                                let m = String(i).padStart(2, '0');
                                document.write(`<div class="px-4 py-2 text-sm font-bold text-gray-600 hover:bg-klein/10 hover:text-klein cursor-pointer transition-colors" onclick="selectMonth('${m}', '${i}月')">${i}月</div>`);
                            }
                        </script>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8 relative z-10">
            <div class="lg:col-span-1 flex flex-col gap-6">
                <div class="glass-panel rounded-3xl p-8 relative overflow-hidden group">
                    <div class="absolute -right-10 -top-10 w-32 h-32 bg-klein opacity-5 rounded-full blur-2xl group-hover:scale-150 transition-transform duration-700"></div>
                    <h2 class="text-sm font-bold text-gray-500 mb-2 uppercase tracking-widest">已分潤累積收益</h2>
                    <div class="flex items-baseline gap-1">
                        <span class="text-xl font-black text-klein">NT$</span>
                        <p id="total-revenue" class="text-4xl font-black text-gray-900 tracking-tight">...</p>
                    </div>
                </div>
                <div class="glass-panel rounded-3xl p-8 relative overflow-hidden group">
                    <div class="absolute -right-10 -top-10 w-32 h-32 bg-orange-500 opacity-5 rounded-full blur-2xl group-hover:scale-150 transition-transform duration-700"></div>
                    <h2 class="text-sm font-bold text-gray-500 mb-2 uppercase tracking-widest">待結算收益</h2>
                    <div class="flex items-baseline gap-1">
                        <span class="text-xl font-black text-orange-500">NT$</span>
                        <p id="pending-revenue" class="text-4xl font-black text-gray-900 tracking-tight">...</p>
                    </div>
                </div>
                <div class="glass-panel rounded-3xl p-8 relative overflow-hidden group">
                    <div class="absolute -right-10 -top-10 w-32 h-32 bg-purple-500 opacity-5 rounded-full blur-2xl group-hover:scale-150 transition-transform duration-700"></div>
                    <h2 class="text-sm font-bold text-gray-500 mb-2 uppercase tracking-widest">當前區間總收益 (含待結算)</h2>
                    <div class="flex items-baseline gap-1">
                        <span class="text-xl font-black text-purple-500">NT$</span>
                        <p id="combined-revenue" class="text-4xl font-black text-gray-900 tracking-tight">...</p>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2 glass-panel rounded-3xl p-6 flex flex-col">
                <h3 class="text-base font-bold text-gray-700 mb-4 flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-klein"></span> 
                    <span id="pie-chart-title">業主收入佔比分析</span>
                </h3>
                <div class="flex-1 relative min-h-[250px] w-full flex items-center justify-center">
                    <canvas id="revenuePieChart"></canvas>
                    <div id="chart-empty-state" class="absolute inset-0 flex items-center justify-center text-gray-400 font-bold hidden">
                        該區間尚無數據
                    </div>
                </div>
            </div>
        </div>

        <div class="flex flex-col lg:flex-row gap-4 mb-4 relative z-20">
            <div class="glass-panel rounded-2xl p-2 flex-1 lg:max-w-xs flex items-center px-4">
                <span class="text-gray-400 mr-2">🔍</span>
                <input type="text" id="searchInput" placeholder="搜尋業主名稱..." class="bg-transparent border-none outline-none w-full font-bold text-gray-700 placeholder-gray-400 py-2" oninput="renderView()">
            </div>

            <div class="glass-panel rounded-2xl p-3 flex-1 flex flex-wrap items-center gap-2">
                <span class="text-xs font-black text-gray-400 tracking-widest uppercase mr-2">⭐ 常用過濾 (可多選)</span>
                <div id="fav-clients-container" class="flex flex-wrap gap-2 items-center flex-1">
                </div>
                <div class="flex items-center gap-1 border-l border-gray-200 pl-3 ml-auto">
                    <button onclick="addFavClient()" class="text-klein font-black text-sm hover:bg-klein/10 px-3 py-1 rounded-full transition-colors">+ 新增</button>
                    <button onclick="removeFavClient()" class="text-red-500 font-black text-sm hover:bg-red-50 px-3 py-1 rounded-full transition-colors">- 刪除</button>
                </div>
            </div>
        </div>

        <div class="glass-panel rounded-3xl overflow-hidden relative z-10">
            <div class="px-8 py-6 border-b border-white/50 bg-white/30">
                <h3 class="font-bold text-gray-800 text-lg">收益明細列表</h3>
            </div>
            
            <div class="overflow-x-auto no-scrollbar p-2">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-gray-400 text-xs tracking-wider uppercase border-b border-gray-100">
                            <th class="px-6 py-4 font-bold whitespace-nowrap">年月</th>
                            <th class="px-6 py-4 font-bold whitespace-nowrap">業主編號</th>
                            <th class="px-6 py-4 font-bold whitespace-nowrap">業主名稱</th>
                            <th class="px-6 py-4 font-bold whitespace-nowrap">案件名稱</th>
                            <th class="px-6 py-4 font-bold text-right whitespace-nowrap">比例</th>
                            <th class="px-6 py-4 font-bold text-right whitespace-nowrap">分潤金額</th>
                            <th class="px-6 py-4 font-bold text-center whitespace-nowrap">狀態</th>
                        </tr>
                    </thead>
                    <tbody id="revenue-table-body" class="divide-y divide-gray-100/50">
                        <tr>
                            <td colspan="7" class="px-6 py-12 text-center text-gray-400 font-bold loading-pulse">
                                正在安全地載入您的資料...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDllqltvIctsNWUuLW75kLUtcRnTjXdvBs",
            authDomain: "jaran-money.firebaseapp.com",
            projectId: "jaran-money",
            storageBucket: "jaran-money.firebasestorage.app",
            messagingSenderId: "616171972475",
            appId: "1:616171972475:web:980452f45898a03b4ebfde"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const tableBody = document.getElementById('revenue-table-body');
        const totalRevenueEl = document.getElementById('total-revenue');
        const pendingRevenueEl = document.getElementById('pending-revenue');
        const combinedRevenueEl = document.getElementById('combined-revenue'); 
        const lastUpdateEl = document.getElementById('last-update');
        const chartEmptyState = document.getElementById('chart-empty-state');
        const searchInput = document.getElementById('searchInput');
        const pieChartTitle = document.getElementById('pie-chart-title');

        let allPartnerData = [];
        let pieChartInstance = null;
        
        window.selectedYear = 'all';
        window.selectedMonth = 'all';
        window.activeFavClients = new Set(); 
        window.favClients = JSON.parse(localStorage.getItem('partner_fav_clients')) || ['小花', '醫敏家', '瑞瑞', '漢恩'];

        const formatCurrency = (amount) => {
            return new Intl.NumberFormat('zh-TW', { minimumFractionDigits: 0 }).format(amount);
        };

        window.toggleDropdown = function(menuId) {
            document.querySelectorAll('.custom-dropdown-menu').forEach(menu => {
                if(menu.id !== menuId) menu.classList.remove('active');
            });
            document.getElementById(menuId).classList.toggle('active');
        };

        window.selectYear = function(val, text) {
            window.selectedYear = val;
            document.getElementById('year-btn-text').innerText = text;
            document.getElementById('year-menu').classList.remove('active');
            renderView();
        };

        window.selectMonth = function(val, text) {
            window.selectedMonth = val;
            document.getElementById('month-btn-text').innerText = text;
            document.getElementById('month-menu').classList.remove('active');
            renderView();
        };

        document.addEventListener('click', (e) => {
            if (!e.target.closest('#year-dropdown-container')) document.getElementById('year-menu').classList.remove('active');
            if (!e.target.closest('#month-dropdown-container')) document.getElementById('month-menu').classList.remove('active');
        });

        window.renderFavClients = function() {
            const container = document.getElementById('fav-clients-container');
            container.innerHTML = '';
            if(window.favClients.length === 0) {
                container.innerHTML = '<span class="text-gray-400 text-xs font-bold">尚無常用設定</span>';
                return;
            }
            window.favClients.forEach(c => {
                const isActive = window.activeFavClients.has(c) ? 'active' : '';
                container.innerHTML += `<div class="fav-bubble ${isActive}" onclick="toggleFavClient('${c}')">${c}</div>`;
            });
        };

        window.toggleFavClient = function(clientName) {
            if (window.activeFavClients.has(clientName)) {
                window.activeFavClients.delete(clientName); 
            } else {
                window.activeFavClients.add(clientName); 
            }
            renderFavClients();
            renderView();
        };

        window.addFavClient = function() {
            let name = prompt("請輸入要新增的常用業主名稱：");
            if (name && name.trim()) {
                name = name.trim();
                if (!window.favClients.includes(name)) {
                    window.favClients.push(name);
                    localStorage.setItem('partner_fav_clients', JSON.stringify(window.favClients));
                    renderFavClients();
                }
            }
        };

        window.removeFavClient = function() {
            let name = prompt("請輸入要刪除的常用業主名稱：");
            if (name && window.favClients.includes(name)) {
                window.favClients = window.favClients.filter(c => c !== name);
                localStorage.setItem('partner_fav_clients', JSON.stringify(window.favClients));
                window.activeFavClients.delete(name); 
                renderView();
                renderFavClients();
            } else if(name) {
                alert("找不到該業主名稱！");
            }
        };

        function updatePieChart(filteredData) {
            const ctx = document.getElementById('revenuePieChart').getContext('2d');
            if (pieChartInstance) pieChartInstance.destroy();

            const isAggregatedView = (window.selectedMonth === 'all');
            
            pieChartTitle.innerText = isAggregatedView 
                ? '業主總收入佔比 (年度聚合，顯示總金額)' 
                : '業主收入佔比 (各月追蹤，區分已分潤/待結算)'; // 🚨 改為已分潤

            let clientStats = {};
            filteredData.forEach(d => {
                let name = d.clientName || '未知業主';
                if (!clientStats[name]) {
                    clientStats[name] = { total: 0, settled: 0, pending: 0 };
                }
                const amt = d.amount || 0;
                clientStats[name].total += amt;
                
                // 🚨 這裡也改為判斷 '已分潤'
                if (d.status === '已分潤') {
                    clientStats[name].settled += amt;
                } else {
                    clientStats[name].pending += amt;
                }
            });

            const labels = [];
            const dataValues = [];
            const bgColors = [];

            const colorPalette = [
                { base: '#002FA7', light: 'rgba(0, 47, 167, 0.35)' },
                { base: '#00D26A', light: 'rgba(0, 210, 106, 0.35)' },
                { base: '#FF9500', light: 'rgba(255, 149, 0, 0.35)' },
                { base: '#7c3aed', light: 'rgba(124, 58, 237, 0.35)' },
                { base: '#FF3B30', light: 'rgba(255, 59, 48, 0.35)' },
                { base: '#5AC8FA', light: 'rgba(90, 200, 250, 0.35)' },
                { base: '#FF2D55', light: 'rgba(255, 45, 85, 0.35)' },
                { base: '#001D66', light: 'rgba(0, 29, 102, 0.35)' }
            ];

            let colorIndex = 0;

            Object.keys(clientStats).forEach(clientName => {
                const stats = clientStats[clientName];
                const colors = colorPalette[colorIndex % colorPalette.length];
                
                if (isAggregatedView) {
                    if (stats.total > 0) {
                        labels.push(clientName);
                        dataValues.push(stats.total);
                        bgColors.push(colors.base);
                    }
                } else {
                    if (stats.settled > 0) {
                        labels.push(`${clientName} (已分潤)`); // 🚨 圖表文字改為已分潤
                        dataValues.push(stats.settled);
                        bgColors.push(colors.base);
                    }
                    if (stats.pending > 0) {
                        labels.push(`${clientName} (待結算)`);
                        dataValues.push(stats.pending);
                        bgColors.push(colors.light);
                    }
                }
                colorIndex++; 
            });

            if (labels.length === 0) {
                document.getElementById('revenuePieChart').style.display = 'none';
                chartEmptyState.classList.remove('hidden');
                return;
            } else {
                document.getElementById('revenuePieChart').style.display = 'block';
                chartEmptyState.classList.add('hidden');
            }

            pieChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: dataValues,
                        backgroundColor: bgColors,
                        borderWidth: 2,
                        borderColor: '#ffffff',
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '60%',
                    plugins: {
                        legend: { position: 'right', labels: { usePointStyle: true, padding: 12, font: { family: 'Inter', weight: 'bold', size: 12 } } },
                        tooltip: { backgroundColor: 'rgba(255, 255, 255, 0.95)', titleColor: '#002FA7', bodyColor: '#1D1D1F', borderColor: 'rgba(0, 47, 167, 0.1)', borderWidth: 1, padding: 12, callbacks: { label: function(context) { return ' NT$ ' + context.raw.toLocaleString(); } } }
                    }
                }
            });
        }

        window.renderView = function() {
            const searchKeyword = searchInput.value.trim().toLowerCase();

            let filteredData = allPartnerData.filter(d => {
                const parts = (d.date || '').split('-');
                const rYear = parts[0];
                const rMonth = parts.length > 1 ? parts[1].padStart(2, '0') : null;

                const matchYear = (window.selectedYear === 'all') || (rYear === window.selectedYear);
                const matchMonth = (window.selectedMonth === 'all') || (rMonth === window.selectedMonth);
                
                const matchSearch = searchKeyword === '' || (d.clientName && d.clientName.toLowerCase().includes(searchKeyword));
                const matchFav = window.activeFavClients.size === 0 || window.activeFavClients.has(d.clientName);
                
                return matchYear && matchMonth && matchSearch && matchFav;
            });

            filteredData.sort((a, b) => (b.date || '').localeCompare(a.date || ''));

            let htmlContent = '';
            let totalAccumulated = 0;
            let totalPending = 0;
            let combinedAccumulated = 0; 

            if (filteredData.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="7" class="px-6 py-12 text-center text-gray-500 font-bold">此區間/條件下尚無分潤紀錄。</td></tr>';
                totalRevenueEl.textContent = '0';
                pendingRevenueEl.textContent = '0';
                combinedRevenueEl.textContent = '0'; 
                updatePieChart([]);
                return;
            }

            filteredData.forEach((data) => {
                const amount = data.amount || 0;
                combinedAccumulated += amount; 
                // 🚨 這裡改為判斷 '已分潤'
                if (data.status === '已分潤') totalAccumulated += amount; else totalPending += amount;

                // 🚨 標籤顯示改為 '已分潤'
                const statusHtml = data.status === '已分潤' 
                    ? `<span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-black bg-green-100 text-green-700 border border-green-200 shadow-sm">已分潤</span>`
                    : `<span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-black bg-orange-100 text-orange-700 border border-orange-200 shadow-sm">待結算</span>`;

                htmlContent += `
                    <tr class="hover:bg-klein-glass transition-colors group">
                        <td class="px-6 py-4 text-sm whitespace-nowrap text-gray-500 font-bold">${data.date || '-'}</td>
                        <td class="px-6 py-4 text-sm whitespace-nowrap font-black text-gray-400 bg-white/20">${data.clientNumber || '-'}</td>
                        <td class="px-6 py-4 text-sm whitespace-nowrap text-klein font-black bg-white/20">${data.clientName || '-'}</td>
                        <td class="px-6 py-4 text-sm text-gray-900 font-black">${data.projectName || '-'}</td>
                        <td class="px-6 py-4 text-sm text-right text-klein font-bold bg-white/30">${data.percent || 0}%</td>
                        <td class="px-6 py-4 text-sm text-right font-black text-gray-900 group-hover:text-klein transition-colors bg-white/30">${formatCurrency(amount)}</td>
                        <td class="px-6 py-4 text-center">${statusHtml}</td>
                    </tr>
                `;
            });

            tableBody.innerHTML = htmlContent;
            totalRevenueEl.textContent = formatCurrency(totalAccumulated);
            pendingRevenueEl.textContent = formatCurrency(totalPending);
            combinedRevenueEl.textContent = formatCurrency(combinedAccumulated);

            updatePieChart(filteredData);
        }

        async function loadPartnerData() {
            try {
                const docRef = doc(db, 'system_data', 'partner_view');
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const dataObj = docSnap.data();
                    allPartnerData = JSON.parse(dataObj.data);
                    
                    const updateDate = new Date(dataObj.lastUpdate);
                    lastUpdateEl.innerText = `最後更新：${updateDate.toLocaleDateString()} ${updateDate.toLocaleTimeString()}`;
                    lastUpdateEl.classList.add('text-klein');

                    let years = new Set();
                    allPartnerData.forEach(d => { if (d.date && d.date !== '未定') years.add(d.date.split('-')[0]); });
                    
                    const yearOptionsContainer = document.getElementById('year-options');
                    yearOptionsContainer.innerHTML = '';
                    Array.from(years).sort().reverse().forEach(y => { 
                        yearOptionsContainer.innerHTML += `<div class="px-4 py-2 text-sm font-bold text-gray-600 hover:bg-klein/10 hover:text-klein cursor-pointer transition-colors" onclick="selectYear('${y}', '${y} 年')">${y} 年</div>`;
                    });

                    renderFavClients();

                    if (years.size > 0) {
                        let latestYear = Array.from(years).sort().reverse()[0];
                        selectYear(latestYear, `${latestYear} 年`);
                    } else {
                        renderView();
                    }

                } else {
                    tableBody.innerHTML = '<tr><td colspan="7" class="px-6 py-12 text-center text-gray-500 font-bold">尚未同步任何資料。</td></tr>';
                    lastUpdateEl.innerText = "等待同步...";
                }
            } catch (error) {
                console.error("讀取資料失敗：", error);
                tableBody.innerHTML = '<tr><td colspan="7" class="px-6 py-12 text-center text-red-500 font-bold">資料連線失敗，請檢查網路。</td></tr>';
                lastUpdateEl.innerText = "連線失敗";
            }
        }

        loadPartnerData();
    </script>
</body>
</html>
