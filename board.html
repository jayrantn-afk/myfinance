<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jayran Studio | 雲端極簡互動白板</title>
    <style>
        /* 全域極簡現代感設計 */
        body {
            margin: 0;
            padding: 0;
            background-color: #f7f8fa;
            background-image: radial-gradient(#e1e4eb 1.2px, transparent 1.2px);
            background-size: 24px 24px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            user-select: none;
        }

        /* 頂部高級感毛玻璃功能列 */
        .controls {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.75);
            padding: 8px 24px;
            border-radius: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn {
            background-color: #1e293b;
            color: #f8fafc;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background-color: #0f172a;
            transform: translateY(-1px);
        }

        .btn.active {
            background-color: #2563eb;
            box-shadow: 0 0 12px rgba(37, 99, 235, 0.3);
        }

        .divider {
            width: 1px;
            height: 20px;
            background-color: #e2e8f0;
            margin: 0 4px;
        }

        .status {
            font-size: 12px;
            color: #64748b;
            font-weight: 500;
        }

        /* 畫筆顏色選擇器 */
        .brush-colors {
            display: flex;
            gap: 6px;
        }
        .brush-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.1s;
        }
        .brush-dot.active {
            transform: scale(1.2);
            border-color: #ffffff;
            box-shadow: 0 0 0 1.5px #1e293b;
        }

        /* 画布區域 */
        #board {
            width: 100%;
            height: 100%;
            position: relative;
        }

        #drawing-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none; /* 平時不擋住卡片點擊 */
        }
        #board.drawing-mode #drawing-canvas {
            pointer-events: auto; /* 畫筆模式時開啟點擊 */
            cursor: crosshair;
        }

        /* 項目容器的通用的層級 */
        .board-item {
            position: absolute;
            z-index: 2;
        }

        /* 1. 精緻日系便利貼樣式 */
        .note {
            width: 240px; 
            min-height: 160px;
            height: auto;
            padding: 16px 16px 16px 32px; 
            box-sizing: border-box;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05), 0 2px 6px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            border-radius: 8px; /* 圓角微調更有氣質 */
            border: 1px solid rgba(0,0,0,0.03);
        }

        /* 左側高質感手把 */
        .drag-handle {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 20px;
            background: rgba(0, 0, 0, 0.02);
            border-right: 1px dashed rgba(0, 0, 0, 0.06);
            cursor: move;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(0, 0, 0, 0.2);
            font-size: 10px;
            border-top-left-radius: 8px;
            border-bottom-left-radius: 8px;
        }
        .note:hover .drag-handle {
            background: rgba(0, 0, 0, 0.04);
        }

        /* 簡潔型懸浮工具列 */
        .note-toolbar {
            position: absolute;
            top: -38px; 
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            align-items: center;
            background: #ffffff;
            padding: 4px 8px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            opacity: 0;
            pointer-events: none; 
            transition: all 0.2s ease;
            z-index: 100;
            border: 1px solid #f1f5f9;
        }
        .note:hover .note-toolbar {
            opacity: 1;
            pointer-events: auto;
            top: -32px; 
        }

        .toolbar-item {
            font-size: 11px;
            padding: 2px 6px;
            border: 1px solid #e2e8f0;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            color: #475569;
            font-weight: 600;
            height: 22px;
        }
        .toolbar-item:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
        }

        .color-dots {
            display: flex;
            gap: 5px;
            border-left: 1px solid #e2e8f0;
            padding-left: 6px;
        }
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.1);
        }

        /* 內文區域 */
        .note-content {
            width: 100%;
            height: auto;
            min-height: 120px;
            border: none;
            background: transparent;
            font-size: 14px;
            line-height: 1.6;
            color: #334155;
            outline: none;
            cursor: text; 
            word-break: break-all;
            white-space: pre-wrap;
            user-select: text; 
        }

        /* 2. 磁鐵主體樣式 */
        .magnet {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15), inset 0 -3px 0 rgba(0,0,0,0.15);
            cursor: move;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: transform 0.1s;
        }
        .magnet:active {
            transform: scale(1.1);
        }

        /* 通用圓形紅色軟刪除鈕 */
        .delete-btn {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ef4444;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(239,68,68,0.3);
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 101;
        }
        .note:hover .delete-btn, .magnet:hover .delete-btn {
            opacity: 1;
        }

    </style>
</head>
<body>

    <div class="controls">
        <button class="btn" id="add-note-btn">📄 新增便利貼</button>
        <button class="btn" id="add-magnet-btn">🧲 新增磁鐵</button>
        <div class="divider"></div>
        <button class="btn" id="brush-toggle-btn">🖌️ 麥克筆模式</button>
        <div class="brush-colors" id="brush-colors-box" style="display:none;">
            <div class="brush-dot active" style="background:#1e293b" data-color="#1e293b"></div>
            <div class="brush-dot" style="background:#ef4444" data-color="#ef4444"></div>
            <div class="brush-dot" style="background:#2563eb" data-color="#2563eb"></div>
            <div class="brush-dot" style="background:#10b981" data-color="#10b981"></div>
        </div>
        <button class="btn" id="clear-canvas-btn" style="background:#f1f5f9; color:#475569; display:none;">🧹 清除塗鴉</button>
        <div class="divider"></div>
        <span class="status" id="sync-status">☁️ 雲端已同步</span>
    </div>

    <div id="board">
        <canvas id="drawing-canvas"></canvas>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 沿用你的 Firebase 金鑰
        const firebaseConfig = {
            apiKey: "AIzaSyC5DspOkctRSuXJojh8iJu1uJ31E9ykN10",
            authDomain: "my-sticky-notes-5929c.firebaseapp.com",
            projectId: "my-sticky-notes-5929c",
            storageBucket: "my-sticky-notes-5929c.firebasestorage.app",
            messagingSenderId: "44041714179",
            appId: "1:44041714179:web:f8baac058e2068ad026c36"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // 分離集合：物件與畫布
        const itemsRef = collection(db, "board_items");
        const canvasRef = collection(db, "board_canvas");

        const board = document.getElementById('board');
        const canvas = document.getElementById('drawing-canvas');
        const ctx = canvas.getContext('2d');
        
        const addNoteBtn = document.getElementById('add-note-btn');
        const addMagnetBtn = document.getElementById('add-magnet-btn');
        const brushToggleBtn = document.getElementById('brush-toggle-btn');
        const brushColorsBox = document.getElementById('brush-colors-box');
        const clearCanvasBtn = document.getElementById('clear-canvas-btn');
        const syncStatus = document.getElementById('sync-status');
        
        const noteColors = ['#fffbeb', '#f0fdf4', '#eff6ff', '#fdf2f8', '#faf5ff', '#fff7ed']; // 高級感淡調色
        const magnetColors = ['#f43f5e', '#3b82f6', '#10b981', '#eab308', '#a855f7']; // 鮮艷磁鐵色
        let zIndexCounter = 10;
        let isDraggingGlobal = false;
        
        // 麥克筆畫布狀態
        let isDrawingMode = false;
        let isDrawing = false;
        let currentBrushColor = '#1e293b';
        let linesData = []; // 用來存放所有線條

        // 初始化畫布尺寸
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            redrawCanvas();
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function showStatus(text, color) {
            syncStatus.textContent = text;
            syncStatus.style.color = color;
        }

        // --- 麥克筆畫筆核心事件 ---
        brushToggleBtn.addEventListener('click', () => {
            isDrawingMode = !isDrawingMode;
            if (isDrawingMode) {
                isDrawingMode = true;
                board.classList.add('drawing-mode');
                brushToggleBtn.classList.add('active');
                brushColorsBox.style.display = 'flex';
                clearCanvasBtn.style.display = 'flex';
            } else {
                isDrawingMode = false;
                board.classList.remove('drawing-mode');
                brushToggleBtn.classList.remove('active');
                brushColorsBox.style.display = 'none';
                clearCanvasBtn.style.display = 'none';
            }
        });

        // 選擇畫筆顏色
        document.querySelectorAll('.brush-dot').forEach(dot => {
            dot.addEventListener('click', (e) => {
                document.querySelector('.brush-dot.active').classList.remove('active');
                dot.classList.add('active');
                currentBrushColor = dot.dataset.color;
            });
        });

        canvas.addEventListener('mousedown', (e) => {
            if (!isDrawingMode) return;
            isDrawing = true;
            ctx.beginPath();
            ctx.moveTo(e.clientX, e.clientY);
            // 建立一條新線的結構
            linesData.push({ color: currentBrushColor, points: [{x: e.clientX, y: e.clientY}] });
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawingMode || !isDrawing) return;
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.strokeStyle = currentBrushColor;
            ctx.lineTo(e.clientX, e.clientY);
            ctx.stroke();
            
            // 記錄點座標
            linesData[linesData.length - 1].points.push({x: e.clientX, y: e.clientY});
        });

        canvas.addEventListener('mouseup', async () => {
            if (!isDrawing) return;
            isDrawing = false;
            // 畫完一筆，整坨線條上傳雲端
            showStatus("⚡ 正在同步手繪線條...", "#f59e0b");
            await setDoc(doc(canvasRef, "drawing_layer"), { lines: JSON.stringify(linesData) });
            showStatus("✅ 雲端已即時同步", "#10b981");
        });

        // 清除畫布
        clearCanvasBtn.addEventListener('click', async () => {
            linesData = [];
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            await setDoc(doc(canvasRef, "drawing_layer"), { lines: JSON.stringify([]) });
        });

        function redrawCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            linesData.forEach(line => {
                if (line.points.length < 1) return;
                ctx.beginPath();
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.strokeStyle = line.color;
                ctx.moveTo(line.points[0].x, line.points[0].y);
                for(let i=1; i<line.points.length; i++) {
                    ctx.lineTo(line.points[i].x, line.points[i].y);
                }
                ctx.stroke();
            });
        }

        // 監聽雲端畫布
        onSnapshot(doc(canvasRef, "drawing_layer"), (doc) => {
            if (doc.exists() && !isDrawing) {
                const data = doc.data();
                linesData = data.lines ? JSON.parse(data.lines) : [];
                redrawCanvas();
            }
        });


        // --- 物件（便利貼 / 磁鐵）雲端監聽與生成 ---
        async function uploadItem(id, data) {
            showStatus("⚡ 正在同步雲端...", "#f59e0b");
            await setDoc(doc(itemsRef, id), data, { merge: true });
            showStatus("✅ 雲端已即時同步", "#10b981");
        }

        onSnapshot(itemsRef, (snapshot) => {
            if (isDraggingGlobal) return;
            const currentItems = document.querySelectorAll('.board-item');
            const cloudIds = [];

            snapshot.forEach((doc) => {
                const data = doc.data();
                const id = doc.id;
                cloudIds.push(id);
                let el = document.getElementById(id);

                if (!el) {
                    if (data.type === 'note') {
                        renderNote(id, data);
                    } else if (data.type === 'magnet') {
                        renderMagnet(id, data);
                    }
                } else {
                    // 同步位置與內容
                    if (data.type === 'note') {
                        const contentNode = el.querySelector('.note-content');
                        if (document.activeElement !== contentNode) {
                            el.style.left = data.left;
                            el.style.top = data.top;
                            el.style.backgroundColor = data.bg;
                            el.style.zIndex = data.zIndex;
                            contentNode.innerHTML = data.html;
                        }
                    } else if (data.type === 'magnet') {
                        el.style.left = data.left;
                        el.style.top = data.top;
                        el.style.zIndex = data.zIndex;
                    }
                }
                if (parseInt(data.zIndex) >= zIndexCounter) zIndexCounter = parseInt(data.zIndex) + 1;
            });

            currentItems.forEach(item => {
                if (!cloudIds.includes(item.id)) item.remove();
            });
        });

        // 按鈕點擊：新增便利貼
        addNoteBtn.addEventListener('click', async () => {
            const id = 'note_' + Date.now();
            await uploadItem(id, {
                type: 'note',
                html: '新注意事項...',
                left: `${Math.random() * (window.innerWidth - 300) + 60}px`,
                top: `${Math.random() * (window.innerHeight - 300) + 120}px`,
                bg: noteColors[Math.floor(Math.random() * noteColors.length)],
                zIndex: zIndexCounter++,
                rotate: (Math.random() * 2 - 1).toFixed(1)
            });
        });

        // 按鈕點擊：新增磁鐵
        addMagnetBtn.addEventListener('click', async () => {
            const id = 'magnet_' + Date.now();
            await uploadItem(id, {
                type: 'magnet',
                left: `${Math.random() * (window.innerWidth - 100) + 60}px`,
                top: `${Math.random() * (window.innerHeight - 100) + 120}px`,
                bg: magnetColors[Math.floor(Math.random() * magnetColors.length)],
                zIndex: zIndexCounter++
            });
        });

        // 渲染便利貼到畫面上
        function renderNote(id, data) {
            const note = document.createElement('div');
            note.className = 'board-item note';
            note.id = id;
            note.style.left = data.left;
            note.style.top = data.top;
            note.style.backgroundColor = data.bg;
            note.style.zIndex = data.zIndex;
            note.style.transform = `rotate(${data.rotate}deg)`;

            note.innerHTML = `
                <div class="drag-handle">⋮⋮</div>
                <div class="delete-btn">✕</div>
                <div class="note-toolbar">
                    <button class="toolbar-item btn-bold">B</button>
                    <select class="toolbar-item select-size">
                        <option value="">大小</option>
                        <option value="2">小</option>
                        <option value="3">中</option>
                        <option value="5">大</option>
                    </select>
                    <select class="toolbar-item select-color">
                        <option value="">顏色</option>
                        <option value="#334155">黑</option>
                        <option value="#ef4444">紅</option>
                        <option value="#2563eb">藍</option>
                    </select>
                    <div class="color-dots">
                        ${noteColors.map(c => `<div class="dot" style="background:${c}" data-color="${c}"></div>`).join('')}
                    </div>
                </div>
                <div class="note-content" contenteditable="true">${data.html}</div>
            `;

            const contentNode = note.querySelector('.note-content');
            const toolbar = note.querySelector('.note-toolbar');
            const handle = note.querySelector('.drag-handle');

            toolbar.addEventListener('mousedown', (e) => e.stopPropagation());

            const getArgs = () => ({
                html: contentNode.innerHTML,
                left: note.style.left,
                top: note.style.top,
                bg: note.style.backgroundColor,
                zIndex: note.style.zIndex
            });

            // 工具按鈕
            note.querySelector('.btn-bold').addEventListener('click', () => { document.execCommand('bold', false, null); uploadItem(id, getArgs()); });
            
            let savedSel = null;
            contentNode.addEventListener('mouseup', () => { let s = window.getSelection(); if(s.rangeCount>0) savedSel = s.getRangeAt(0).cloneRange(); });
            const resSel = () => { if(savedSel){ let s=window.getSelection(); s.removeAllRanges(); s.addRange(savedSel); } };

            note.querySelector('.select-size').addEventListener('change', (e) => { if(e.target.value){ contentNode.focus(); resSel(); document.execCommand('fontSize', false, e.target.value); uploadItem(id, getArgs()); e.target.value=""; } });
            note.querySelector('.select-color').addEventListener('change', (e) => { if(e.target.value){ contentNode.focus(); resSel(); document.execCommand('foreColor', false, e.target.value); uploadItem(id, getArgs()); e.target.value=""; } });
            
            note.querySelectorAll('.dot').forEach(d => d.addEventListener('click', () => { note.style.backgroundColor = d.dataset.color; uploadItem(id, getArgs()); }));

            contentNode.addEventListener('input', () => uploadItem(id, getArgs()));
            contentNode.addEventListener('blur', () => uploadItem(id, getArgs()));
            contentNode.addEventListener('mousedown', (e) => { e.stopPropagation(); note.style.zIndex = zIndexCounter++; });

            bindDrag(note, handle, id, 'note', getArgs);
            note.querySelector('.delete-btn').addEventListener('click', () => removeItem(id, note));
            board.appendChild(note);
        }

        // 渲染磁鐵到畫面上
        function renderMagnet(id, data) {
            const mag = document.createElement('div');
            mag.className = 'board-item magnet';
            mag.id = id;
            mag.style.left = data.left;
            mag.style.top = data.top;
            mag.style.backgroundColor = data.bg;
            mag.style.zIndex = data.zIndex;
            mag.innerHTML = `<div class="delete-btn">✕</div>`; // 磁鐵直接自身就是把手

            const getArgs = () => ({
                left: mag.style.left,
                top: mag.style.top,
                zIndex: mag.style.zIndex
            });

            bindDrag(mag, mag, id, 'magnet', getArgs);
            mag.querySelector('.delete-btn').addEventListener('click', (e) => { e.stopPropagation(); removeItem(id, mag); });
            board.appendChild(mag);
        }

        // 通用拖曳綁定
        function bindDrag(el, handleEl, id, type, getArgsFunc) {
            let isDragging = false;
            let startX, startY, startLeft, startTop;

            handleEl.addEventListener('mousedown', (e) => {
                if (isDrawingMode || e.target.classList.contains('delete-btn')) return;
                isDragging = true;
                isDraggingGlobal = true;
                el.classList.add('dragging');
                el.style.zIndex = zIndexCounter++;

                startX = e.clientX;
                startY = e.clientY;
                startLeft = parseInt(el.style.left);
                startTop = parseInt(el.style.top);

                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            });

            function onMouseMove(e) {
                if (!isDragging) return;
                let nl = startLeft + (e.clientX - startX);
                let nt = startTop + (e.clientY - startY);

                if (nl < 0) nl = 0; if (nt < 0) nt = 0;
                if (nl > window.innerWidth - el.offsetWidth) nl = window.innerWidth - el.offsetWidth;
                if (nt > window.innerHeight - el.offsetHeight) nt = window.innerHeight - el.offsetHeight;

                el.style.left = `${nl}px`;
                el.style.top = `${nt}px`;
            }

            async function onMouseUp() {
                if (isDragging) {
                    isDragging = false;
                    isDraggingGlobal = false;
                    el.classList.remove('dragging');
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                    await uploadItem(id, getArgsFunc());
                }
            }
        }

        async function removeItem(id, el) {
            showStatus("⚡ 正在雲端刪除...", "#f59e0b");
            el.remove();
            await deleteDoc(doc(db, "board_items", id));
            showStatus("✅ 雲端已即時同步", "#10b981");
        }
    </script>
</body>
</html>
