<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動式雲端白板便利貼</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f5f7;
            background-image: 
                radial-gradient(#e0e2e6 1.5px, transparent 1.5px), 
                radial-gradient(#e0e2e6 1.5px, #f4f5f7 1.5px);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            backdrop-filter: blur(5px);
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:hover {
            background-color: #1d4ed8;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .status {
            font-size: 12px;
            color: #10b981;
            font-weight: bold;
        }

        #board {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .note {
            position: absolute;
            width: 240px; /* 稍微加寬容納更多工具 */
            min-height: 180px;
            height: auto;
            padding: 12px;
            box-sizing: border-box;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.12);
            cursor: move;
            user-select: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-radius: 2px;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .note.dragging {
            transform: scale(1.03) rotate(-1deg) !important;
            box-shadow: 5px 15px 25px rgba(0,0,0,0.18);
            z-index: 999 !important;
        }

        .note-toolbar {
            display: flex;
            flex-wrap: wrap; /* 讓工具過多時能自動折行 */
            gap: 4px;
            align-items: center;
            background: rgba(255, 255, 255, 0.5);
            padding: 4px 6px;
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.2s;
            cursor: default;
        }

        .note:hover .note-toolbar {
            opacity: 1;
        }

        .toolbar-item {
            font-size: 11px;
            padding: 2px 4px;
            border: 1px solid rgba(0,0,0,0.1);
            background: white;
            border-radius: 3px;
            cursor: pointer;
            color: #334155;
            font-weight: bold;
            height: 22px;
            box-sizing: border-box;
        }
        .toolbar-item:hover {
            background: #f1f5f9;
        }

        select.toolbar-item {
            font-weight: normal;
        }

        .color-dots {
            display: flex;
            gap: 4px;
            margin-left: auto;
        }
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.15);
        }

        .note-content {
            width: 100%;
            height: auto;
            min-height: 100px;
            border: none;
            background: transparent;
            font-size: 15px;
            line-height: 1.5;
            color: #334155;
            outline: none;
            cursor: move;
            word-break: break-all;
            white-space: pre-wrap;
        }

        .note-content.editing {
            cursor: text;
        }

        .delete-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #ef4444;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            opacity: 0;
            transition: opacity 0.2s, transform 0.1s;
            z-index: 10;
        }

        .note:hover .delete-btn {
            opacity: 1;
        }
        .delete-btn:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div class="controls">
        <button class="btn" id="add-btn">+ 新增雲端便利貼</button>
        <span class="status" id="sync-status">☁️ 雲端同步中...</span>
    </div>

    <div id="board"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 已保留你的專屬 Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyC5DspOkctRSuXJojh8iJu1uJ31E9ykN10",
            authDomain: "my-sticky-notes-5929c.firebaseapp.com",
            projectId: "my-sticky-notes-5929c",
            storageBucket: "my-sticky-notes-5929c.firebasestorage.app",
            messagingSenderId: "44041714179",
            appId: "1:44041714179:web:f8baac058e2068ad026c36"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const notesRef = collection(db, "sticky_notes");

        const board = document.getElementById('board');
        const addBtn = document.getElementById('add-btn');
        const syncStatus = document.getElementById('sync-status');
        
        const colors = ['#fff9db', '#e7f5ff', '#e6fcf5', '#fff0f6', '#f3f0ff', '#fff4e6'];
        let zIndexCounter = 1;
        let isDraggingGlobal = false; 

        function showSavedStatus() {
            syncStatus.textContent = "✅ 雲端已即時同步";
            syncStatus.style.color = "#10b981";
        }
        function showSavingStatus() {
            syncStatus.textContent = "⚡ 正在儲存至雲端...";
            syncStatus.style.color = "#f59e0b";
        }

        async function uploadNoteToCloud(noteId, data) {
            showSavingStatus();
            await setDoc(doc(notesRef, noteId), data, { merge: true });
            showSavedStatus();
        }

        // 監聽雲端資料庫變動
        onSnapshot(notesRef, (snapshot) => {
            if (isDraggingGlobal) return; 

            const currentNotes = document.querySelectorAll('.note');
            const cloudIds = [];

            snapshot.forEach((doc) => {
                const data = doc.data();
                const noteId = doc.id;
                cloudIds.push(noteId);

                let existingNote = document.getElementById(noteId);

                if (!existingNote) {
                    createNoteNode(noteId, data.html, data.left, data.top, data.bg, data.zIndex, data.rotate);
                } else {
                    const contentNode = existingNote.querySelector('.note-content');
                    if (contentNode.contentEditable !== "true") {
                        existingNote.style.left = data.left;
                        existingNote.style.top = data.top;
                        existingNote.style.backgroundColor = data.bg;
                        existingNote.style.zIndex = data.zIndex;
                        contentNode.innerHTML = data.html;
                    }
                }
                if (parseInt(data.zIndex) >= zIndexCounter) zIndexCounter = parseInt(data.zIndex) + 1;
            });

            currentNotes.forEach(note => {
                if (!cloudIds.includes(note.id)) {
                    note.remove();
                }
            });
            showSavedStatus();
        });

        addBtn.addEventListener('click', async () => {
            const noteId = 'note_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
            const x = `${Math.random() * (window.innerWidth - 280) + 50}px`;
            const y = `${Math.random() * (window.innerHeight - 350) + 100}px`;
            const rotateVal = (Math.random() * 3 - 1.5).toFixed(1);
            const defaultBg = colors[Math.floor(Math.random() * colors.length)];

            await uploadNoteToCloud(noteId, {
                html: "新注意事項...",
                left: x,
                top: y,
                bg: defaultBg,
                zIndex: zIndexCounter++,
                rotate: rotateVal
            });
        });

        function createNoteNode(noteId, htmlContent, left, top, bg, zIndex, rotate) {
            const note = document.createElement('div');
            note.className = 'note';
            note.id = noteId;
            note.style.left = left;
            note.style.top = top;
            note.style.backgroundColor = bg;
            note.style.zIndex = zIndex;
            note.style.transform = `rotate(${rotate}deg)`;

            // 升級工具列：加上字體切換功能
            note.innerHTML = `
                <div class="delete-btn">✕</div>
                <div class="note-toolbar">
                    <button class="toolbar-item btn-bold" title="粗體">B</button>
                    <select class="toolbar-item select-font" title="切換字體">
                        <option value="system-ui, sans-serif">預設黑體</option>
                        <option value="'BiauKai', '標楷體', sans-serif">標楷體</option>
                        <option value="'PMingLiU', '新細明體', serif">新細明體</option>
                        <option value="'Microsoft JhengHei', '微軟正黑體', sans-serif">微軟正黑體</option>
                        <option value="'YuGothic', 'Mplus 1p', 'Rounded Mplus 1c', sans-serif">原體/圓體</option>
                    </select>
                    <select class="toolbar-item select-size" title="字體大小">
                        <option value="3">中</option>
                        <option value="2">小</option>
                        <option value="5">大</option>
                    </select>
                    <select class="toolbar-item select-color" title="文字顏色">
                        <option value="#334155">黑</option>
                        <option value="#ef4444">紅</option>
                        <option value="#2563eb">藍</option>
                        <option value="#10b981">綠</option>
                    </select>
                    <div class="color-dots">
                        ${colors.map(c => `<div class="dot" style="background:${c}" data-color="${c}"></div>`).join('')}
                    </div>
                </div>
                <div class="note-content" contenteditable="false">${htmlContent}</div>
            `;

            const contentNode = note.querySelector('.note-content');
            const deleteBtn = note.querySelector('.delete-btn');
            const toolbar = note.querySelector('.note-toolbar');
            
            const btnBold = note.querySelector('.btn-bold');
            const selectFont = note.querySelector('.select-font');
            const selectSize = note.querySelector('.select-size');
            const selectColor = note.querySelector('.select-color');
            const dots = note.querySelectorAll('.dot');

            toolbar.addEventListener('mousedown', (e) => e.stopPropagation());

            const saveCurrentState = () => {
                uploadNoteToCloud(noteId, {
                    html: contentNode.innerHTML,
                    left: note.style.left,
                    top: note.style.top,
                    bg: note.style.backgroundColor,
                    zIndex: note.style.zIndex
                });
            };

            // 粗體
            btnBold.addEventListener('click', () => {
                document.execCommand('bold', false, null);
                contentNode.focus();
                saveCurrentState();
            });

            // 💡 字體家族切換核心功能
            selectFont.addEventListener('change', (e) => {
                document.execCommand('fontName', false, e.target.value);
                contentNode.focus();
                saveCurrentState();
            });

            // 大小
            selectSize.addEventListener('change', (e) => {
                document.execCommand('fontSize', false, e.target.value);
                contentNode.focus();
                saveCurrentState();
            });

            // 顏色
            selectColor.addEventListener('change', (e) => {
                document.execCommand('foreColor', false, e.target.value);
                contentNode.focus();
                saveCurrentState();
            });

            // 卡片顏色
            dots.forEach(dot => {
                dot.addEventListener('click', () => {
                    note.style.backgroundColor = dot.getAttribute('data-color');
                    saveCurrentState();
                });
            });

            contentNode.addEventListener('dblclick', () => {
                contentNode.contentEditable = "true";
                contentNode.classList.add('editing');
                contentNode.focus();
            });

            contentNode.addEventListener('blur', () => {
                contentNode.contentEditable = "false";
                contentNode.classList.remove('editing');
                saveCurrentState();
            });

            contentNode.addEventListener('input', saveCurrentState);
            contentNode.addEventListener('mousedown', (e) => {
                if (contentNode.contentEditable === "true") e.stopPropagation(); 
            });

            let isDragging = false;
            let startX, startY, startLeft, startTop;

            note.addEventListener('mousedown', (e) => {
                if (e.target === deleteBtn || contentNode.contentEditable === "true") return;

                isDragging = true;
                isDraggingGlobal = true;
                note.classList.add('dragging');
                note.style.zIndex = zIndexCounter++;

                startX = e.clientX;
                startY = e.clientY;
                startLeft = parseInt(note.style.left);
                startTop = parseInt(note.style.top);

                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            });

            function onMouseMove(e) {
                if (!isDragging) return;
                let newLeft = startLeft + (e.clientX - startX);
                let newTop = startTop + (e.clientY - startY);

                if (newLeft < 0) newLeft = 0;
                if (newTop < 0) newTop = 0;
                if (newLeft > window.innerWidth - note.offsetWidth) newLeft = window.innerWidth - note.offsetWidth;
                if (newTop > window.innerHeight - note.offsetHeight) newTop = window.innerHeight - note.offsetHeight;

                note.style.left = `${newLeft}px`;
                note.style.top = `${newTop}px`;
            }

            async function onMouseUp() {
                if (isDragging) {
                    isDragging = false;
                    isDraggingGlobal = false;
                    note.classList.remove('dragging');
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                    saveCurrentState();
                }
            }

            deleteBtn.addEventListener('click', async () => {
                showSavingStatus();
                note.remove();
                await deleteDoc(doc(notesRef, noteId));
                showSavedStatus();
            });

            board.appendChild(note);
        }
    </script>
</body>
</html>
