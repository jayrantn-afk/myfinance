<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jayran Studio | 雲端極簡互動白板與筆記本</title>
    <style>
        /* 全域極簡現代感設計 */
        body {
            margin: 0;
            padding: 0;
            background-color: #f7f8fa;
            background-image: radial-gradient(#e1e4eb 1.2px, transparent 1.2px);
            background-size: 24px 24px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            user-select: none;
            display: flex; 
        }

        /* 頂部高級感毛玻璃功能列 */
        .controls {
            position: fixed;
            top: 24px;
            left: calc(50% - 175px); 
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.75);
            padding: 8px 24px;
            border-radius: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn {
            background-color: #1e293b;
            color: #f8fafc;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .btn:hover {
            background-color: #0f172a;
            transform: translateY(-1px);
        }

        .btn.active {
            background-color: #2563eb;
            box-shadow: 0 0 12px rgba(37, 99, 235, 0.3);
        }

        .divider {
            width: 1px;
            height: 20px;
            background-color: #e2e8f0;
            margin: 0 4px;
        }

        .status {
            font-size: 12px;
            color: #64748b;
            font-weight: 500;
            white-space: nowrap;
        }

        /* 👑 整合型畫筆工具箱（含顏色與板擦圈圈） */
        .brush-colors {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .brush-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.1s;
        }
        .brush-dot.active {
            transform: scale(1.2);
            border-color: #ffffff;
            box-shadow: 0 0 0 1.5px #1e293b;
        }
        
        /* 👑 板擦圈圈樣式 */
        .eraser-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            background: #ffffff;
            border: 1px solid #cbd5e1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            transition: transform 0.1s;
            box-sizing: border-box;
        }
        .eraser-dot.active {
            transform: scale(1.2);
            background: #2563eb;
            border-color: #2563eb;
            box-shadow: 0 0 8px rgba(37, 99, 235, 0.4);
        }

        /* 左側：白板區域 */
        #board {
            flex: 1;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        #drawing-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none; 
        }
        #board.drawing-mode #drawing-canvas, #board.eraser-mode #drawing-canvas {
            pointer-events: auto; 
            cursor: crosshair;
        }

        /* 右側：筆記本模式區域 */
        #notebook-sidebar {
            width: 350px;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            border-left: 1px solid #e2e8f0;
            box-shadow: -4px 0 24px rgba(0, 0, 0, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .notebook-header {
            padding: 20px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .notebook-title {
            font-size: 16px;
            font-weight: 600;
            color: #1e293b;
        }

        .month-selector {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-month-btn {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #475569;
            transition: all 0.2s;
        }
        .nav-month-btn:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }

        #current-month-display {
            font-size: 14px;
            font-weight: 600;
            color: #334155;
            min-width: 80px;
            text-align: center;
        }

        .notebook-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px 20px 30px 20px;
        }

        .day-row {
            display: flex;
            border-bottom: 1px solid #f1f5f9;
            padding: 10px 0;
            align-items: flex-start;
            gap: 12px;
        }

        .day-label {
            width: 50px;
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
            padding-top: 2px;
            text-align: right;
            white-space: nowrap;
        }
        
        .day-row.weekend .day-label {
            color: #ef4444; 
        }

        .day-input {
            flex: 1;
            font-size: 14px;
            line-height: 1.5;
            color: #334155;
            outline: none;
            border: none;
            background: transparent;
            word-break: break-all;
            white-space: pre-wrap;
            cursor: text;
            user-select: text;
            min-height: 22px;
        }
        .day-input:empty:not(:focus)::before {
            content: "點擊紀錄今天的事...";
            color: #cbd5e1;
            font-size: 13px;
        }

        /* 物件容器 */
        .board-item {
            position: absolute;
            z-index: 2;
        }

        /* 便利貼樣式 */
        .note {
            width: 240px; 
            min-height: 160px;
            height: auto;
            padding: 16px 16px 16px 32px; 
            box-sizing: border-box;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05), 0 2px 6px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            border-radius: 8px; 
            border: 1px solid rgba(0,0,0,0.03);
        }

        .drag-handle {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 20px;
            background: rgba(0, 0, 0, 0.02);
            border-right: 1px dashed rgba(0, 0, 0, 0.06);
            cursor: move;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(0, 0, 0, 0.2);
            font-size: 10px;
            border-top-left-radius: 8px;
            border-bottom-left-radius: 8px;
        }
        .note:hover .drag-handle {
            background: rgba(0, 0, 0, 0.04);
        }

        .note-content {
            width: 100%;
            height: auto;
            min-height: 120px;
            border: none;
            background: transparent;
            font-size: 14px;
            line-height: 1.6;
            color: #334155;
            outline: none;
            cursor: text; 
            word-break: break-all;
            white-space: pre-wrap;
            user-select: text; 
        }

        /* 磁鐵樣式 */
        .magnet {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15), inset 0 -3px 0 rgba(0,0,0,0.15);
            cursor: move;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: transform 0.1s;
        }

        .delete-btn {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ef4444;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(239,68,68,0.3);
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 101;
        }
        .note:hover .delete-btn, .magnet:hover .delete-btn {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="controls">
        <button class="btn" id="add-note-btn">📄 新增便利貼</button>
        <button class="btn" id="add-magnet-btn">🧲 新增磁鐵</button>
        <div class="divider"></div>
        
        <button class="btn" id="brush-toggle-btn">🖌️ 麥克筆模式</button>
        
        <div class="brush-colors" id="brush-colors-box" style="display:none;">
            <div class="brush-dot active" style="background:#1e293b" data-mode="draw" data-color="#1e293b"></div>
            <div class="brush-dot" style="background:#ef4444" data-mode="draw" data-color="#ef4444"></div>
            <div class="brush-dot" style="background:#2563eb" data-mode="draw" data-color="#2563eb"></div>
            <div class="brush-dot" style="background:#10b981" data-mode="draw" data-color="#10b981"></div>
            <div class="eraser-dot" id="eraser-dot-btn" data-mode="erase" title="切換為板擦">🧽</div>
            <button class="btn" id="clear-canvas-btn" style="background:#f1f5f9; color:#475569; padding: 4px 10px; font-size: 11px; height: 22px; border-radius: 11px;">🧹 全清</button>
        </div>
        
        <div class="divider"></div>
        <span class="status" id="sync-status">☁️ 雲端已同步</span>
    </div>

    <div id="board">
        <canvas id="drawing-canvas"></canvas>
    </div>

    <div id="notebook-sidebar">
        <div class="notebook-header">
            <div class="notebook-title">📒 筆記本模式</div>
            <div class="month-selector">
                <button class="nav-month-btn" id="prev-month">◀</button>
                <div id="current-month-display">2026 年 5 月</div>
                <button class="nav-month-btn" id="next-month">▶</button>
            </div>
        </div>
        <div class="notebook-content" id="days-container"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC5DspOkctRSuXJojh8iJu1uJ31E9ykN10",
            authDomain: "my-sticky-notes-5929c.firebaseapp.com",
            projectId: "my-sticky-notes-5929c",
            storageBucket: "my-sticky-notes-5929c.firebasestorage.app",
            messagingSenderId: "44041714179",
            appId: "1:44041714179:web:f8baac058e2068ad026c36"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const itemsRef = collection(db, "board_items");
        const canvasRef = collection(db, "board_canvas");
        const notebookRef = collection(db, "board_notebook"); 

        const board = document.getElementById('board');
        const canvas = document.getElementById('drawing-canvas');
        const ctx = canvas.getContext('2d');
        
        const addNoteBtn = document.getElementById('add-note-btn');
        const addMagnetBtn = document.getElementById('add-magnet-btn');
        const brushToggleBtn = document.getElementById('brush-toggle-btn');
        const brushColorsBox = document.getElementById('brush-colors-box');
        const eraserDotBtn = document.getElementById('eraser-dot-btn');
        const clearCanvasBtn = document.getElementById('clear-canvas-btn');
        const syncStatus = document.getElementById('sync-status');
        
        const noteColors = ['#fffbeb', '#f0fdf4', '#eff6ff', '#fdf2f8', '#faf5ff', '#fff7ed'];
        const magnetColors = ['#f43f5e', '#3b82f6', '#10b981', '#eab308', '#a855f7'];
        let zIndexCounter = 10;
        let isDraggingGlobal = false;
        
        // 麥克筆與板擦狀態
        let isDrawingMode = false;
        let currentToolState = 'draw'; // 'draw' 或 'erase'
        let isDrawing = false;
        let isErasing = false;
        let currentBrushColor = '#1e293b';
        let linesData = []; 

        let currentDate = new Date();
        let currentYear = currentDate.getFullYear();
        let currentMonth = currentDate.getMonth(); 
        let unsubscribeNotebook = null;

        function resizeCanvas() {
            canvas.width = board.clientWidth;
            canvas.height = board.clientHeight;
            redrawCanvas();
        }
        window.addEventListener('resize', resizeCanvas);
        setTimeout(resizeCanvas, 100);

        function showStatus(text, color) {
            syncStatus.textContent = text;
            syncStatus.style.color = color;
        }

        // 筆記本邏輯
        const daysContainer = document.getElementById('days-container');
        const currentMonthDisplay = document.getElementById('current-month-display');
        const prevMonthBtn = document.getElementById('prev-month');
        const nextMonthBtn = document.getElementById('next-month');

        function updateNotebookUI() {
            currentMonthDisplay.textContent = `${currentYear} 年 ${currentMonth + 1} 月`;
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            daysContainer.innerHTML = '';

            for (let d = 1; d <= daysInMonth; d++) {
                const dayOfWeek = new Date(currentYear, currentMonth, d).getDay(); 
                const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
                const dayRow = document.createElement('div');
                dayRow.className = `day-row ${isWeekend ? 'weekend' : ''}`;
                const docId = `${currentYear}_${String(currentMonth + 1).padStart(2, '0')}_${String(d).padStart(2, '0')}`;
                
                dayRow.innerHTML = `
                    <div class="day-label">${d} 日 (${['日','一','二','三','四','五','六'][dayOfWeek]})</div>
                    <div class="day-input" id="input_${docId}" contenteditable="true"></div>
                `;
                
                const inputNode = dayRow.querySelector('.day-input');
                inputNode.addEventListener('mousedown', (e) => e.stopPropagation());
                inputNode.addEventListener('input', () => {
                    showStatus("⚡ 正在儲存筆記...", "#f59e0b");
                    setDoc(doc(notebookRef, docId), { text: inputNode.innerHTML }, { merge: true });
                });
                daysContainer.appendChild(dayRow);
            }

            if (unsubscribeNotebook) unsubscribeNotebook();
            unsubscribeNotebook = onSnapshot(collection(db, "board_notebook"), (snapshot) => {
                snapshot.forEach((doc) => {
                    const id = doc.id;
                    if (id.startsWith(`${currentYear}_${String(currentMonth + 1).padStart(2, '0')}`)) {
                        const inputField = document.getElementById(`input_${id}`);
                        if (inputField && document.activeElement !== inputField) {
                            inputField.innerHTML = doc.data().text || '';
                        }
                    }
                });
                showStatus("✅ 雲端已即時同步", "#10b981");
            });
        }

        prevMonthBtn.addEventListener('click', () => {
            currentMonth--; if (currentMonth < 0) { currentMonth = 11; currentYear--; } updateNotebookUI();
        });
        nextMonthBtn.addEventListener('click', () => {
            currentMonth++; if (currentMonth > 11) { currentMonth = 0; currentYear++; } updateNotebookUI();
        });

        updateNotebookUI();

        // 👑 麥克筆大按鈕功能切換
        brushToggleBtn.addEventListener('click', () => {
            isDrawingMode = !isDrawingMode;
            if (isDrawingMode) {
                brushToggleBtn.classList.add('active'); 
                brushColorsBox.style.display = 'flex'; 
                setCanvasToolStyle(); // 套用當前選取的子工具狀態（筆或板擦）
            } else {
                board.classList.remove('drawing-mode');
                board.classList.remove('eraser-mode');
                brushToggleBtn.classList.remove('active'); 
                brushColorsBox.style.display = 'none'; 
            }
        });

        // 👑 動態變更畫布工具樣式
        function setCanvasToolStyle() {
            if (!isDrawingMode) return;
            if (currentToolState === 'draw') {
                board.classList.remove('eraser-mode');
                board.classList.add('drawing-mode');
            } else if (currentToolState === 'erase') {
                board.classList.remove('drawing-mode');
                board.classList.add('eraser-mode');
            }
        }

        // 👑 點選顏色圈圈：切換為對應顏色的麥克筆
        document.querySelectorAll('.brush-dot').forEach(dot => {
            dot.addEventListener('click', () => {
                // 移除所有子項目的作用樣式
                const activeDot = document.querySelector('.brush-dot.active');
                if(activeDot) activeDot.classList.remove('active');
                eraserDotBtn.classList.remove('active');

                dot.classList.add('active');
                currentToolState = 'draw';
                currentBrushColor = dot.dataset.color;
                setCanvasToolStyle();
            });
        });

        // 👑 點選🧽圈圈：切換為板擦
        eraserDotBtn.addEventListener('click', () => {
            const activeDot = document.querySelector('.brush-dot.active');
            if(activeDot) activeDot.classList.remove('active');
            eraserDotBtn.classList.add('active');

            currentToolState = 'erase';
            setCanvasToolStyle();
        });

        // 畫布滑鼠事件
        canvas.addEventListener('mousedown', (e) => {
            if (!isDrawingMode) return;
            if (currentToolState === 'draw') {
                isDrawing = true; ctx.beginPath(); ctx.moveTo(e.clientX, e.clientY);
                linesData.push({ color: currentBrushColor, points: [{x: e.clientX, y: e.clientY}] });
            } else if (currentToolState === 'erase') {
                isErasing = true;
                eraseLinesAt(e.clientX, e.clientY);
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawingMode) return;
            if (currentToolState === 'draw' && isDrawing) { 
                ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = currentBrushColor; ctx.lineTo(e.clientX, e.clientY); ctx.stroke();
                linesData[linesData.length - 1].points.push({x: e.clientX, y: e.clientY});
            } else if (currentToolState === 'erase' && isErasing) {
                eraseLinesAt(e.clientX, e.clientY);
            }
        });

        function eraseLinesAt(x, y) {
            const eraserRadius = 15; 
            let modified = false;

            linesData = linesData.filter(line => {
                let keepLine = true;
                for (let p of line.points) {
                    let dist = Math.sqrt(Math.pow(p.x - x, 2) + Math.pow(p.y - y, 2));
                    if (dist <= eraserRadius) {
                        keepLine = false; 
                        modified = true;
                        break;
                    }
                }
                return keepLine;
            });

            if (modified) redrawCanvas();
        }

        canvas.addEventListener('mouseup', async () => {
            if (isDrawing || isErasing) {
                isDrawing = false; isErasing = false;
                showStatus("⚡ 正在同步畫布...", "#f59e0b");
                await setDoc(doc(canvasRef, "drawing_layer"), { lines: JSON.stringify(linesData) }); 
                showStatus("✅ 雲端已即時同步", "#10b981");
            }
        });

        clearCanvasBtn.addEventListener('click', async () => {
            linesData = []; ctx.clearRect(0, 0, canvas.width, canvas.height); await setDoc(doc(canvasRef, "drawing_layer"), { lines: JSON.stringify([]) });
        });

        function redrawCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            linesData.forEach(line => {
                if (line.points.length < 1) return; ctx.beginPath(); ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = line.color; ctx.moveTo(line.points[0].x, line.points[0].y);
                for(let i=1; i<line.points.length; i++) ctx.lineTo(line.points[i].x, line.points[i].y);
                ctx.stroke();
            });
        }

        onSnapshot(doc(canvasRef, "drawing_layer"), (doc) => {
            if (doc.exists() && !isDrawing && !isErasing) { linesData = doc.data().lines ? JSON.parse(doc.data().lines) : []; redrawCanvas(); }
        });

        // 物件增刪
        async function uploadItem(id, data) {
            showStatus("⚡ 正在同步雲端...", "#f59e0b"); await setDoc(doc(itemsRef, id), data, { merge: true }); showStatus("✅ 雲端已即時同步", "#10b981");
        }

        onSnapshot(itemsRef, (snapshot) => {
            if (isDraggingGlobal) return;
            const currentItems = document.querySelectorAll('.board-item'); const cloudIds = [];
            snapshot.forEach((doc) => {
                const data = doc.data(); const id = doc.id; cloudIds.push(id); let el = document.getElementById(id);
                if (!el) {
                    if (data.type === 'note') renderNote(id, data); else if (data.type === 'magnet') renderMagnet(id, data);
                } else {
                    if (data.type === 'note') {
                        const contentNode = el.querySelector('.note-content');
                        if (document.activeElement !== contentNode) { el.style.left = data.left; el.style.top = data.top; el.style.backgroundColor = data.bg; el.style.zIndex = data.zIndex; contentNode.innerHTML = data.html; }
                    } else if (data.type === 'magnet') { el.style.left = data.left; el.style.top = data.top; el.style.zIndex = data.zIndex; }
                }
                if (parseInt(data.zIndex) >= zIndexCounter) zIndexCounter = parseInt(data.zIndex) + 1;
            });
            currentItems.forEach(item => { if (!cloudIds.includes(item.id)) item.remove(); });
        });

        addNoteBtn.addEventListener('click', async () => {
            const id = 'note_' + Date.now();
            await uploadItem(id, {
                type: 'note', html: '新注意事項...', left: `${Math.random() * (board.clientWidth - 300) + 60}px`, top: `${Math.random() * (board.clientHeight - 300) + 120}px`,
                bg: noteColors[Math.floor(Math.random() * noteColors.length)], zIndex: zIndexCounter++, rotate: (Math.random() * 2 - 1).toFixed(1)
            });
        });

        addMagnetBtn.addEventListener('click', async () => {
            const id = 'magnet_' + Date.now();
            await uploadItem(id, { type: 'magnet', left: `${Math.random() * (board.clientWidth - 100) + 60}px`, top: `${Math.random() * (board.clientHeight - 100) + 120}px`, bg: magnetColors[Math.floor(Math.random() * magnetColors.length)], zIndex: zIndexCounter++ });
        });

        function renderNote(id, data) {
            const note = document.createElement('div');
            note.className = 'board-item note';
            note.id = id;
            note.style.left = data.left;
            note.style.top = data.top;
            note.style.backgroundColor = data.bg;
            note.style.zIndex = data.zIndex;
            note.style.transform = `rotate(${data.rotate}deg)`;

            note.innerHTML = `
                <div class="drag-handle">⋮⋮</div>
                <div class="delete-btn">✕</div>
                <div class="note-content" contenteditable="true">${data.html}</div>
            `;

            const contentNode = note.querySelector('.note-content');
            const handle = note.querySelector('.drag-handle');

            const getArgs = () => ({ html: contentNode.innerHTML, left: note.style.left, top: note.style.top, bg: note.style.backgroundColor, zIndex: note.style.zIndex });

            contentNode.addEventListener('input', () => uploadItem(id, getArgs()));
            contentNode.addEventListener('blur', () => uploadItem(id, getArgs()));
            contentNode.addEventListener('mousedown', (e) => { e.stopPropagation(); note.style.zIndex = zIndexCounter++; });

            bindDrag(note, handle, id, 'note', getArgs);
            note.querySelector('.delete-btn').addEventListener('click', () => removeItem(id, note));
            board.appendChild(note);
        }

        function renderMagnet(id, data) {
            const mag = document.createElement('div'); mag.className = 'board-item magnet'; mag.id = id; mag.style.left = data.left; mag.style.top = data.top; mag.style.backgroundColor = data.bg; mag.style.zIndex = data.zIndex;
            mag.innerHTML = `<div class="delete-btn">✕</div>`;
            const getArgs = () => ({ left: mag.style.left, top: mag.style.top, zIndex: mag.style.zIndex });
            bindDrag(mag, mag, id, 'magnet', getArgs);
            mag.querySelector('.delete-btn').addEventListener('click', (e) => { e.stopPropagation(); removeItem(id, mag); });
            board.appendChild(mag);
        }

        function bindDrag(el, handleEl, id, type, getArgsFunc) {
            let isDragging = false; let startX, startY, startLeft, startTop;
            handleEl.addEventListener('mousedown', (e) => {
                if (isDrawingMode || e.target.classList.contains('delete-btn')) return;
                isDragging = true; isDraggingGlobal = true; el.classList.add('dragging'); el.style.zIndex = zIndexCounter++;
                startX = e.clientX; startY = e.clientY; startLeft = parseInt(el.style.left); startTop = parseInt(el.style.top);
                document.addEventListener('mousemove', onMouseMove); document.addEventListener('mouseup', onMouseUp);
            });
            function onMouseMove(e) {
                if (!isDragging) return; let nl = startLeft + (e.clientX - startX); let nt = startTop + (e.clientY - startY);
                if (nl < 0) nl = 0; if (nt < 0) nt = 0;
                if (nl > board.clientWidth - el.offsetWidth) nl = board.clientWidth - el.offsetWidth;
                if (nt > board.clientHeight - el.offsetHeight) nt = board.clientHeight - el.offsetHeight;
                el.style.left = `${nl}px`; el.style.top = `${nt}px`;
            }
            async function onMouseUp() {
                if (isDragging) { isDragging = false; isDraggingGlobal = false; el.classList.remove('dragging'); document.removeEventListener('mousemove', onMouseMove); document.removeEventListener('mouseup', onMouseUp); await uploadItem(id, getArgsFunc()); }
            }
        }

        async function removeItem(id, el) {
            showStatus("⚡ 正在雲端刪除...", "#f59e0b"); el.remove(); await deleteDoc(doc(db, "board_items", id)); showStatus("✅ 雲端已即時同步", "#10b981");
        }
    </script>
</body>
</html>
