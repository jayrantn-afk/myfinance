<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動式白板便利貼</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f5f7;
            background-image: 
                radial-gradient(#e0e2e6 1.5px, transparent 1.5px), 
                radial-gradient(#e0e2e6 1.5px, #f4f5f7 1.5px);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.85);
            padding: 10px 20px;
            border-radius: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            backdrop-filter: blur(5px);
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:hover {
            background-color: #1d4ed8;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .hint {
            font-size: 12px;
            color: #64748b;
        }

        #board {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .note {
            position: absolute;
            width: 180px;
            min-height: 180px;
            padding: 15px;
            box-sizing: border-box;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.12);
            cursor: move;
            user-select: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.1s, box-shadow 0.1s;
            border-radius: 2px;
        }

        .note::after {
            content: "";
            position: absolute;
            bottom: 0;
            right: 2px;
            width: 30px;
            height: 8px;
            box-shadow: 5px 12px 10px rgba(0,0,0,0.15);
            transform: rotate(3deg);
            z-index: -1;
        }

        .note.dragging {
            transform: scale(1.03) rotate(-1deg);
            box-shadow: 5px 15px 25px rgba(0,0,0,0.18);
            z-index: 999 !important;
        }

        .note-content {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
            resize: none;
            font-size: 15px;
            line-height: 1.5;
            color: #334155;
            outline: none;
            cursor: move;
            word-break: break-all;
            white-space: pre-wrap;
        }

        .note-content.editing {
            cursor: text;
        }

        .delete-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: rgba(0,0,0,0.06);
            color: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s, background 0.2s;
        }

        .note:hover .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
    </style>
</head>
<body>

    <div class="controls">
        <button class="btn" id="add-btn">+ 新增便利貼</button>
        <span class="hint">💡 操作說明：拖曳頂端移動｜雙擊文字編輯｜滑鼠移到右上角可刪除</span>
    </div>

    <div id="board"></div>

    <script>
        const board = document.getElementById('board');
        const addBtn = document.getElementById('add-btn');
        
        const colors = [
            '#fff9db', '#e7f5ff', '#e6fcf5', '#fff0f6', '#f3f0ff', '#fff4e6'
        ];

        let zIndexCounter = 1;

        // 預設兩張提示
        createNote('歡迎使用數位白板！雙擊我可以修改內容。', 200, 150);
        createNote('把你的注意事項寫在這裡，自由拖曳擺放吧！', 420, 250);

        addBtn.addEventListener('click', () => {
            const x = Math.random() * (window.innerWidth - 250) + 50;
            const y = Math.random() * (window.innerHeight - 300) + 100;
            createNote('新注意事項...', x, y);
        });

        function createNote(text = '', left = 100, top = 100) {
            const note = document.createElement('div');
            note.className = 'note';
            note.style.left = `${left}px`;
            note.style.top = `${top}px`;
            note.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            note.style.zIndex = zIndexCounter++;

            const randomRotate = (Math.random() * 4 - 2).toFixed(1);
            note.style.transform = `rotate(${randomRotate}deg)`;

            note.innerHTML = `
                <div class="delete-btn">✕</div>
                <div class="note-content" contenteditable="false">${text}</div>
            `;

            const contentNode = note.querySelector('.note-content');
            const deleteBtn = note.querySelector('.delete-btn');

            contentNode.addEventListener('dblclick', (e) => {
                contentNode.contentEditable = "true";
                contentNode.classList.add('editing');
                contentNode.focus();
                document.execCommand('selectAll', false, null);
            });

            contentNode.addEventListener('blur', () => {
                contentNode.contentEditable = "false";
                contentNode.classList.remove('editing');
            });

            contentNode.addEventListener('mousedown', (e) => {
                if (contentNode.contentEditable === "true") {
                    e.stopPropagation(); 
                }
            });

            let isDragging = false;
            let startX, startY;
            let startLeft, startTop;

            note.addEventListener('mousedown', (e) => {
                if (e.target === deleteBtn || contentNode.contentEditable === "true") return;

                isDragging = true;
                note.classList.add('dragging');
                note.style.zIndex = zIndexCounter++;

                startX = e.clientX;
                startY = e.clientY;
                startLeft = parseInt(note.style.left);
                startTop = parseInt(note.style.top);

                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            });

            function onMouseMove(e) {
                if (!isDragging) return;
                
                const deltaX = e.clientX - startX;
                const deltaY = e.clientY - startY;

                let newLeft = startLeft + deltaX;
                let newTop = startTop + deltaY;

                if (newLeft < 0) newLeft = 0;
                if (newTop < 0) newTop = 0;
                if (newLeft > window.innerWidth - note.offsetWidth) newLeft = window.innerWidth - note.offsetWidth;
                if (newTop > window.innerHeight - note.offsetHeight) newTop = window.innerHeight - note.offsetHeight;

                note.style.left = `${newLeft}px`;
                note.style.top = `${newTop}px`;
            }

            function onMouseUp() {
                isDragging = false;
                note.classList.remove('dragging');
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
            }

            deleteBtn.addEventListener('click', () => {
                note.remove();
            });

            board.appendChild(note);
        }

        window.addEventListener('resize', () => {
            const notes = document.querySelectorAll('.note');
            notes.forEach(note => {
                let left = parseInt(note.style.left);
                let top = parseInt(note.style.top);
                if (left > window.innerWidth - note.offsetWidth) {
                    note.style.left = `${window.innerWidth - note.offsetWidth}px`;
                }
                if (top > window.innerHeight - note.offsetHeight) {
                    note.style.top = `${window.innerHeight - note.offsetHeight}px`;
                }
            });
        });
    </script>
</body>
</html>
