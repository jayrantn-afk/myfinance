<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動式白板便利貼 Pro (自動儲存版)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f5f7;
            background-image: 
                radial-gradient(#e0e2e6 1.5px, transparent 1.5px), 
                radial-gradient(#e0e2e6 1.5px, #f4f5f7 1.5px);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            backdrop-filter: blur(5px);
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:hover {
            background-color: #1d4ed8;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .hint {
            font-size: 12px;
            color: #64748b;
        }

        #board {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .note {
            position: absolute;
            width: 220px;
            min-height: 180px;
            height: auto;
            padding: 12px;
            box-sizing: border-box;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.12);
            cursor: move;
            user-select: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-radius: 2px;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .note.dragging {
            transform: scale(1.03) rotate(-1deg) !important;
            box-shadow: 5px 15px 25px rgba(0,0,0,0.18);
            z-index: 999 !important;
        }

        .note-toolbar {
            display: flex;
            gap: 6px;
            align-items: center;
            background: rgba(255, 255, 255, 0.4);
            padding: 4px 6px;
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.2s;
            cursor: default;
        }

        .note:hover .note-toolbar {
            opacity: 1;
        }

        .toolbar-item {
            font-size: 11px;
            padding: 2px 5px;
            border: 1px solid rgba(0,0,0,0.1);
            background: white;
            border-radius: 3px;
            cursor: pointer;
            color: #334155;
            font-weight: bold;
        }
        .toolbar-item:hover {
            background: #f1f5f9;
        }

        select.toolbar-item {
            font-weight: normal;
        }

        .color-dots {
            display: flex;
            gap: 4px;
            margin-left: auto;
        }
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.15);
        }

        .note-content {
            width: 100%;
            height: auto;
            min-height: 100px;
            border: none;
            background: transparent;
            font-size: 15px;
            line-height: 1.5;
            color: #334155;
            outline: none;
            cursor: move;
            word-break: break-all;
            white-space: pre-wrap;
        }

        .note-content.editing {
            cursor: text;
        }

        .delete-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #ef4444;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            opacity: 0;
            transition: opacity 0.2s, transform 0.1s;
            z-index: 10;
        }

        .note:hover .delete-btn {
            opacity: 1;
        }
        .delete-btn:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div class="controls">
        <button class="btn" id="add-btn">+ 新增便利貼</button>
        <span class="hint">💡 系統已啟用自動儲存功能｜拖曳、修改、刪除皆會同步存檔</span>
    </div>

    <div id="board"></div>

    <script>
        const board = document.getElementById('board');
        const addBtn = document.getElementById('add-btn');
        
        const colors = [
            '#fff9db', '#e7f5ff', '#e6fcf5', '#fff0f6', '#f3f0ff', '#fff4e6'
        ];

        let zIndexCounter = 1;

        // --- 核心：儲存資料到 LocalStorage ---
        function saveNotes() {
            const notesData = [];
            const notes = document.querySelectorAll('.note');
            
            notes.forEach(note => {
                const contentNode = note.querySelector('.note-content');
                notesData.push({
                    id: note.dataset.id,
                    html: contentNode.innerHTML,
                    left: note.style.left,
                    top: note.style.top,
                    bg: note.style.backgroundColor,
                    zIndex: note.style.zIndex,
                    rotate: note.dataset.rotate
                });
            });
            
            localStorage.setItem('board_sticky_notes', JSON.stringify(notesData));
        }

        // --- 核心：載入快取資料 ---
        function loadNotes() {
            const savedData = localStorage.getItem('board_sticky_notes');
            if (savedData) {
                const notesData = JSON.parse(savedData);
                if (notesData.length > 0) {
                    // 找出最大的 zIndex，避免計數器重置
                    notesData.forEach(data => {
                        const z = parseInt(data.zIndex) || 1;
                        if (z >= zIndexCounter) zIndexCounter = z + 1;
                        
                        createNote(data.html, parseInt(data.left), parseInt(data.top), data.bg, data.rotate, data.id);
                    });
                    return;
                }
            }
            // 如果沒有快取紀錄，給予預設範例
            createNote('歡迎使用自動儲存版！<br>不論你如何拖曳、修改，甚至關掉網頁，資料都會自動留在你的瀏覽器裡喔！', 200, 150);
        }

        addBtn.addEventListener('click', () => {
            const x = Math.random() * (window.innerWidth - 280) + 50;
            const y = Math.random() * (window.innerHeight - 350) + 100;
            createNote('新注意事項...', x, y);
            saveNotes(); // 新增時儲存
        });

        // 建立便利貼函式（支援載入歷史參數）
        function createNote(htmlContent = '', left = 100, top = 100, customBg = null, customRotate = null, savedId = null) {
            const note = document.createElement('div');
            note.className = 'note';
            note.style.left = `${left}px`;
            note.style.top = `${top}px`;
            
            // 設定唯一識別 ID
            note.dataset.id = savedId || 'note_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            
            // 底色與旋轉度
            note.style.backgroundColor = customBg || colors[Math.floor(Math.random() * colors.length)];
            note.style.zIndex = zIndexCounter++;
            const rotateVal = customRotate || (Math.random() * 3 - 1.5).toFixed(1);
            note.dataset.rotate = rotateVal;
            note.style.transform = `rotate(${rotateVal}deg)`;

            note.innerHTML = `
                <div class="delete-btn">✕</div>
                <div class="note-toolbar">
                    <button class="toolbar-item btn-bold" title="粗體">B</button>
                    <select class="toolbar-item select-size" title="字體大小">
                        <option value="3">中</option>
                        <option value="2">小</option>
                        <option value="5">大</option>
                    </select>
                    <select class="toolbar-item select-color" title="文字顏色">
                        <option value="#334155">黑</option>
                        <option value="#ef4444">紅</option>
                        <option value="#2563eb">藍</option>
                        <option value="#10b981">綠</option>
                    </select>
                    <div class="color-dots">
                        ${colors.map(c => `<div class="dot" style="background:${c}" data-color="${c}"></div>`).join('')}
                    </div>
                </div>
                <div class="note-content" contenteditable="false">${htmlContent}</div>
            `;

            const contentNode = note.querySelector('.note-content');
            const deleteBtn = note.querySelector('.delete-btn');
            const toolbar = note.querySelector('.note-toolbar');
            
            const btnBold = note.querySelector('.btn-bold');
            const selectSize = note.querySelector('.select-size');
            const selectColor = note.querySelector('.select-color');
            const dots = note.querySelectorAll('.dot');

            toolbar.addEventListener('mousedown', (e) => e.stopPropagation());

            // 格式修改後存檔
            btnBold.addEventListener('click', () => {
                document.execCommand('bold', false, null);
                contentNode.focus();
                saveNotes();
            });

            selectSize.addEventListener('change', (e) => {
                document.execCommand('fontSize', false, e.target.value);
                contentNode.focus();
                saveNotes();
            });

            selectColor.addEventListener('change', (e) => {
                document.execCommand('foreColor', false, e.target.value);
                contentNode.focus();
                saveNotes();
            });

            dots.forEach(dot => {
                dot.addEventListener('click', () => {
                    note.style.backgroundColor = dot.getAttribute('data-color');
                    saveNotes();
                });
            });

            contentNode.addEventListener('dblclick', (e) => {
                contentNode.contentEditable = "true";
                contentNode.classList.add('editing');
                contentNode.focus();
            });

            // 文字編輯完（失去焦點）時存檔
            contentNode.addEventListener('blur', () => {
                contentNode.contentEditable = "false";
                contentNode.classList.remove('editing');
                saveNotes();
            });

            // 即時輸入監聽（選填，確保萬一突發關閉網頁也能記住部分字）
            contentNode.addEventListener('input', () => {
                saveNotes();
            });

            contentNode.addEventListener('mousedown', (e) => {
                if (contentNode.contentEditable === "true") e.stopPropagation(); 
            });

            // 拖曳 (Drag and Drop)
            let isDragging = false;
            let startX, startY;
            let startLeft, startTop;

            note.addEventListener('mousedown', (e) => {
                if (e.target === deleteBtn || contentNode.contentEditable === "true") return;

                isDragging = true;
                note.classList.add('dragging');
                note.style.zIndex = zIndexCounter++;

                startX = e.clientX;
                startY = e.clientY;
                startLeft = parseInt(note.style.left);
                startTop = parseInt(note.style.top);

                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            });

            function onMouseMove(e) {
                if (!isDragging) return;
                
                const deltaX = e.clientX - startX;
                const deltaY = e.clientY - startY;

                let newLeft = startLeft + deltaX;
                let newTop = startTop + deltaY;

                if (newLeft < 0) newLeft = 0;
                if (newTop < 0) newTop = 0;
                if (newLeft > window.innerWidth - note.offsetWidth) newLeft = window.innerWidth - note.offsetWidth;
                if (newTop > window.innerHeight - note.offsetHeight) newTop = window.innerHeight - note.offsetHeight;

                note.style.left = `${newLeft}px`;
                note.style.top = `${newTop}px`;
            }

            function onMouseUp() {
                if (isDragging) {
                    isDragging = false;
                    note.classList.remove('dragging');
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                    saveNotes(); // 拖曳放開後，儲存新位置
                }
            }

            deleteBtn.addEventListener('click', () => {
                note.remove();
                saveNotes(); // 刪除後更新快取
            });

            board.appendChild(note);
        }

        // 頁面初始化：載入資料
        window.addEventListener('DOMContentLoaded', loadNotes);

        // 視窗縮放防溢出
        window.addEventListener('resize', () => {
            const notes = document.querySelectorAll('.note');
            notes.forEach(note => {
                let left = parseInt(note.style.left);
                let top = parseInt(note.style.top);
                if (left > window.innerWidth - note.offsetWidth) {
                    note.style.left = `${window.innerWidth - note.offsetWidth}px`;
                }
                if (top > window.innerHeight - note.offsetHeight) {
                    note.style.top = `${window.innerHeight - note.offsetHeight}px`;
                }
            });
            saveNotes();
        });
    </script>
</body>
</html>
